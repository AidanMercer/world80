monitor = , preferred, auto, 1

#nvidia enviro
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

#Programs
$terminal = kitty
$menu = fuzzel
$browser = zen-browser

# Autostart
exec-once = awww-daemon
exec-once = qs

#input
input {
	kb_layout=us
	follow_mouse=1
	sensitivity=0
}

#general appearance
general {
	gaps_in = 5
	gaps_out = 10
	border_size = 2
	layout = dwindle
}

decoration {
	rounding = 12
	blur {
		enabled = true
		size = 6
		passes = 2
	}
}

# Frosted glass for the Quickshell bar
# (0.55+ syntax: space-separated, no comma)
layerrule = blur quickshell-bar
animations {
	enabled = true
}

#keybinds
$mod = SUPER
bind = $mod, T, exec, $terminal
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, R, exec, $menu
bind = $mod, W, exec, $browser

# Screenshot: region select (Windows-style snipping tool)
bind = $mod SHIFT, S, exec, hyprshot -m region

# Switch workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# Cycle workspaces with scroll wheel
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move focus between windows
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move/swap active window in direction (crosses monitors at edges)
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Cycle prev/next workspace with arrows
bind = $mod CTRL, left,  workspace, -1
bind = $mod CTRL, right, workspace, +1

# Carry active window to prev/next workspace
bind = $mod CTRL SHIFT, left,  movetoworkspace, -1
bind = $mod CTRL SHIFT, right, movetoworkspace, +1
