monitor = , preferred, auto, 1
# per-machine display layout written by the quickshell Display tab (Super+M → Display).
# kept out of the repo since it differs per machine; harmless if absent on a fresh box.
source = ~/.config/hypr/monitors.conf

#nvidia enviro
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# per-machine env overrides, untracked like monitors.conf (the amd laptop needs
# LIBVA_DRIVER_NAME=radeonsi or vaapi dies and video wallpapers decode on cpu)
source = ~/.config/hypr/local.conf

# qt-multimedia won't always pick hw decode on its own — without this the 4K
# wallpaper loop falls back to a 16-thread software decoder (~600MB in qs).
# tries vaapi first (amd), then nvdec (desktop); worst case = software, same as before
env = QT_FFMPEG_DECODING_HW_DEVICE_TYPES,vaapi,cuda

#qt theming: route Qt/KDE apps (dolphin) through qt6ct so they use our
#hand-picked dark palette (~/.config/qt6ct) instead of Qt's buggy partial-dark fallback
env = QT_QPA_PLATFORMTHEME,qt6ct

#cursor: Bibata-Modern-Classic (the end-4 dots cursor). XCURSOR vars cover
#Wayland/XWayland apps + Hyprland's own cursor; GTK reads gtk-3.0/gtk-4.0 settings.ini
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

#Programs
$terminal = kitty
$menu = fuzzel
$browser = zen-browser
$filemanager = ~/dev/mica/mica.sh
$editor = ~/dev/vellum/vellum.sh

# Autostart
exec-once = awww-daemon
exec-once = sleep 1 && ~/dotfiles/.config/hypr/restore-wallpaper.sh
exec-once = qs
# hypridle is started by the shell (auto-lock toggle in Super+Shift+/), not here
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
# tint kitty/fuzzel/hyprlock to the active wallpaper's palette (neutral fallback
# if it isn't a themed folder). re-run on every switch by the theme switcher.
exec-once = sleep 2 && ~/dotfiles/.config/hypr/theme-colors.sh

#input
input {
	kb_layout=us
	follow_mouse=1
	sensitivity=0
	touchpad {
		natural_scroll = true
	}
}

#general appearance
general {
	gaps_in = 12
	gaps_out = 10, 28, 28, 28
	border_size = 0
	layout = dwindle
}

decoration {
	rounding = 12
	active_opacity   = 0.85
	inactive_opacity = 0.80
	blur {
		enabled = true
		size = 6
		passes = 2
	}
}

misc {
	# Don't show Hyprland's bundled default wallpaper (the anime art) or logo
	# at boot — awww paints my real wallpaper a moment after launch.
	force_default_wallpaper = 0
	disable_hyprland_logo = true
	# The lock screen is a quickshell surface. If qs dies while locked (crash,
	# OOM, or a `qs kill` reload), let the restarted instance re-grab the lock
	# instead of dropping to an exposed desktop — fail closed, not open.
	allow_session_lock_restore = 1
}

# Frosted glass for the Quickshell surfaces.
# Bar and resource-tooltip are fitted surfaces — plain `blur` works.
layerrule = blur quickshell-bar
layerrule = blur quickshell-resource-tooltip
# Launcher / control popup / theme switcher are fullscreen transparent scrims,
# so plain `blur` would frost the whole desktop. ignore_alpha skips the scrim
# (alpha 0) and blurs only the card itself.
layerrule = blur on, ignore_alpha 0.1, match:namespace quickshell-launcher
layerrule = blur on, ignore_alpha 0.1, match:namespace quickshell-clipboard
layerrule = blur on, ignore_alpha 0.1, match:namespace quickshell-control-popup
layerrule = blur on, ignore_alpha 0.1, match:namespace quickshell-themeswitcher
layerrule = blur on, ignore_alpha 0.1, match:namespace quickshell-shortcuts
# OSD card (volume/brightness) — transparent surface, frost just the card.
layerrule = blur on, ignore_alpha 0.1, match:namespace quickshell-osd

# Terminal transparency comes from kitty's background_opacity so text stays
# solid. override stops the global 0.85/0.80 from fading the whole window.
windowrule = opacity 1.0 override 1.0 override, match:class kitty
# frostify same deal — its QML bg has the alpha, text stays solid.
windowrule = opacity 1.0 override 1.0 override, match:class frostify
# mica same deal — translucent QML bg, solid text
windowrule = opacity 1.0 override 1.0 override, match:class mica
# vellum too — translucent QML bg, solid text
windowrule = opacity 1.0 override 1.0 override, match:class vellum
# mica's file-picker mode (mica --pick, via the desktop portal) uses class
# mica-picker — float it centered like a dialog, keep the solid-text override.
windowrule = opacity 1.0 override 1.0 override, match:class mica-picker
windowrule = float 1, match:class mica-picker
windowrule = size 1100 680, match:class mica-picker
windowrule = center 1, match:class mica-picker
# dolphin too — Kvantum (Moon theme) makes the window bg translucent while text
# stays solid. override keeps the global dim off so it doesn't fade the text.
windowrule = opacity 1.0 override 1.0 override, match:class org.kde.dolphin
animations {
	enabled = true

	bezier = liquid, 0.16, 1, 0.3, 1

	# Window moves (Super+Shift+arrows, throwing to another monitor, dragging)
	# use a quick ~0.35s slide instead of the slow default.
	# windowsIn/windowsOut (open/close) keep their default animation.
	animation = windowsMove, 1, 3.5, liquid

	# Workspace switching uses the same quick slide.
	animation = workspaces, 1, 3.5, liquid, slide
}

#keybinds
$mod = SUPER
bind = $mod, T, exec, $terminal
bind = $mod, Q, killactive
# Super+M opens the Arch control popup (network / sound / bluetooth / power).
# Arrow keys switch tabs, Escape closes it. Toggling routes through the
# ControlBus singleton, which opens it on the focused monitor.
bind = $mod, M, exec, qs ipc call controlPopup toggle
bind = $mod, R, exec, qs ipc call launcher toggle
# Super+P = command palette (fuzzy theme/panel/toggle/window actions)
bind = $mod, P, exec, qs ipc call commandPalette toggle
# Super+V = clipboard history (enter/click copies back, del drops an entry)
bind = $mod, V, exec, qs ipc call clipboard toggle
bind = $mod SHIFT, T, exec, qs ipc call themeSwitcher toggle
# Restart quickshell (kill + relaunch) when a QML edit drops a window
bind = $mod SHIFT, R, exec, qs kill; qs &
# Super+/ shows the keybind cheat sheet (Esc / any key / click closes it).
bind = $mod, slash, exec, qs ipc call shortcuts toggle
# Super+Shift+/ opens the same popup straight to the Settings tab.
bind = $mod SHIFT, slash, exec, qs ipc call shortcuts settings
# Super+. pins the theme's system readout open (the same panel the bar's
# hover trigger reveals); tap again to tuck it away.
bind = $mod, period, exec, qs ipc call sysinfo toggle
# Nudge desktop lyric sync by ear: ] = later, [ = earlier, Shift+\ = reset.
bind = $mod, bracketright, exec, qs ipc call lyricOffset later
bind = $mod, bracketleft, exec, qs ipc call lyricOffset earlier
bind = $mod SHIFT, backslash, exec, qs ipc call lyricOffset reset
bind = $mod, W, exec, $browser
bind = $mod, E, exec, $filemanager
bind = $mod, N, exec, $editor
bind = $mod, C, exec, code
bind = $mod, G, exec, github-desktop
bind = $mod SHIFT, C, exec, claude-desktop
# Super+S opens frostify (focuses it if already running)
bind = $mod, S, exec, ~/frostify/frostify.sh

# Lock the screen — quickshell's animated lock, hyprlock as fallback
bind = $mod, L, exec, qs ipc call lock lock || ~/.config/hypr/lock.sh

# Tap Super on its own to toggle the Quickshell launcher (Escape also closes it).
# bindr = fire on key *release*; Super_L is the left Super keysym.
# Hyprland won't fire this if Super was held as part of another combo
# (e.g. Super+T), so it only triggers on a clean tap.
# The launcher itself flips open<->closed, so tapping again dismisses it.
bindr = $mod, Super_L, exec, qs ipc call launcher toggle

# Screenshot: region select (Windows-style snipping tool)
bind = $mod SHIFT, S, exec, hyprshot -m region

# Media + brightness keys. The quickshell OSD module owns the action and shows
# the slider — e = repeat while held, l = also fires while the screen is locked.
bindel = , XF86AudioRaiseVolume,  exec, qs ipc call osd volumeUp
bindel = , XF86AudioLowerVolume,  exec, qs ipc call osd volumeDown
bindl  = , XF86AudioMute,         exec, qs ipc call osd muteToggle
bindl  = , XF86AudioMicMute,      exec, qs ipc call osd micMuteToggle
bindel = , XF86MonBrightnessUp,   exec, qs ipc call osd brightnessUp
bindel = , XF86MonBrightnessDown, exec, qs ipc call osd brightnessDown

# Switch workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# Cycle workspaces with scroll wheel (per-monitor stack, skips other monitors)
bind = $mod, mouse_down, exec, ~/dotfiles/.config/hypr/workspace-deep.sh +1
bind = $mod, mouse_up,   exec, ~/dotfiles/.config/hypr/workspace-deep.sh -1

# move focus between windows
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Throw active window to the monitor on the left/right (monitors are in a
# horizontal row). Up/down rearrange the window within the current layout.
bind = $mod SHIFT, left,  movewindow, mon:l
bind = $mod SHIFT, right, movewindow, mon:r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Cycle prev/next workspace with arrows (per-monitor stack: each monitor
# scrolls its own depth, skipping workspaces shown on the other monitors)
bind = $mod CTRL, left,  exec, ~/dotfiles/.config/hypr/workspace-deep.sh -1
bind = $mod CTRL, right, exec, ~/dotfiles/.config/hypr/workspace-deep.sh +1

# Carry active window deeper/shallower through this monitor's own stack
# (same per-monitor logic as Super+Ctrl+arrows, but the window comes along)
bind = $mod CTRL SHIFT, left,  exec, ~/dotfiles/.config/hypr/workspace-deep.sh -1 move
bind = $mod CTRL SHIFT, right, exec, ~/dotfiles/.config/hypr/workspace-deep.sh +1 move

# Floating windows
# Super+F toggles floating; when a window becomes floating the script shrinks
# it to half-screen and centers it (a plain togglefloating keeps the tiled size).
bind = $mod, F, exec, ~/dotfiles/.config/hypr/float-window.sh
# Super+Shift+F fullscreens the active window (real fullscreen, no bar/gaps).
bind = $mod SHIFT, F, fullscreen, 0
# bindm = mouse drag while a modifier is held. mouse:272 = left button.
# Super + left-drag moves the window; Super+Ctrl + left-drag resizes it.
bindm = $mod, mouse:272, movewindow
bindm = $mod CTRL, mouse:272, resizewindow
# Two-finger pinch on the trackpad also resizes.
gesture = 2, pinch, resize
