monitor = , preferred, auto, 1

#nvidia enviro
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

#Programs
$terminal = kitty
$menu = fuzzel

# Autostart
exec-once = awww-daemon

#input
input {
	kb_layout=us
	follow_mouse=1
	sensitivity=0
}

#general appearance
general {
	gaps_in = 5
	gaps_out = 10
	border_size = 2
	layout = dwindle
}

decoration {
	rounding = 12
	blur {
		enabled = true
		size = 6
		passes = 2
	}
}
animations {
	enabled = true
}

#keybinds
$mod = SUPER
bind = $mod, T, exec, $terminal
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, R, exec, $menu
