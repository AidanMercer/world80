monitor = , preferred, auto, 1

#nvidia enviro
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

#qt theming: route Qt/KDE apps (dolphin) through qt6ct so they use our
#hand-picked dark palette (~/.config/qt6ct) instead of Qt's buggy partial-dark fallback
env = QT_QPA_PLATFORMTHEME,qt6ct

#cursor: Bibata-Modern-Classic (the end-4 dots cursor). XCURSOR vars cover
#Wayland/XWayland apps + Hyprland's own cursor; GTK reads gtk-3.0/gtk-4.0 settings.ini
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

#Programs
$terminal = kitty
$menu = fuzzel
$browser = zen-browser
$filemanager = dolphin

# Autostart
exec-once = awww-daemon
exec-once = sleep 1 && awww img ~/Pictures/wallpapers/aishot-4921.jpg
exec-once = qs
exec-once = hypridle
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

#input
input {
	kb_layout=us
	follow_mouse=1
	sensitivity=0
}

#general appearance
general {
	gaps_in = 12
	gaps_out = 10, 28, 28, 28
	border_size = 0
	layout = dwindle
}

decoration {
	rounding = 12
	active_opacity   = 0.85
	inactive_opacity = 0.80
	blur {
		enabled = true
		size = 6
		passes = 2
	}
}

misc {
	# Don't show Hyprland's bundled default wallpaper (the anime art) or logo
	# at boot — awww paints my real wallpaper a moment after launch.
	force_default_wallpaper = 0
	disable_hyprland_logo = true
}

# Frosted glass for the Quickshell bar and launcher
# (0.55+ syntax: space-separated, no comma)
layerrule = blur quickshell-bar
layerrule = blur quickshell-launcher
animations {
	enabled = true

	bezier = liquid, 0.16, 1, 0.3, 1

	# Window moves (Super+Shift+arrows, throwing to another monitor, dragging)
	# use a quick ~0.35s slide instead of the slow default.
	# windowsIn/windowsOut (open/close) keep their default animation.
	animation = windowsMove, 1, 3.5, liquid

	# Workspace switching uses the same quick slide.
	animation = workspaces, 1, 3.5, liquid, slide
}

#keybinds
$mod = SUPER
bind = $mod, T, exec, $terminal
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, R, exec, qs ipc call launcher toggle
bind = $mod SHIFT, T, exec, qs ipc call themeSwitcher toggle
bind = $mod, W, exec, $browser
bind = $mod, E, exec, $filemanager
bind = $mod, C, exec, code
bind = $mod, G, exec, github-desktop
bind = $mod SHIFT, C, exec, claude-desktop

# Lock the screen
bind = $mod, L, exec, hyprlock

# Tap Super on its own to toggle the Quickshell launcher (Escape also closes it).
# bindr = fire on key *release*; Super_L is the left Super keysym.
# Hyprland won't fire this if Super was held as part of another combo
# (e.g. Super+T), so it only triggers on a clean tap.
# The launcher itself flips open<->closed, so tapping again dismisses it.
bindr = $mod, Super_L, exec, qs ipc call launcher toggle

# Screenshot: region select (Windows-style snipping tool)
bind = $mod SHIFT, S, exec, hyprshot -m region

# Switch workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# Cycle workspaces with scroll wheel (per-monitor stack, skips other monitors)
bind = $mod, mouse_down, exec, ~/dotfiles/.config/hypr/workspace-deep.sh +1
bind = $mod, mouse_up,   exec, ~/dotfiles/.config/hypr/workspace-deep.sh -1

# Move focus between windows
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Throw active window to the monitor on the left/right (monitors are in a
# horizontal row). Up/down rearrange the window within the current layout.
bind = $mod SHIFT, left,  movewindow, mon:l
bind = $mod SHIFT, right, movewindow, mon:r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Cycle prev/next workspace with arrows (per-monitor stack: each monitor
# scrolls its own depth, skipping workspaces shown on the other monitors)
bind = $mod CTRL, left,  exec, ~/dotfiles/.config/hypr/workspace-deep.sh -1
bind = $mod CTRL, right, exec, ~/dotfiles/.config/hypr/workspace-deep.sh +1

# Carry active window deeper/shallower through this monitor's own stack
# (same per-monitor logic as Super+Ctrl+arrows, but the window comes along)
bind = $mod CTRL SHIFT, left,  exec, ~/dotfiles/.config/hypr/workspace-deep.sh -1 move
bind = $mod CTRL SHIFT, right, exec, ~/dotfiles/.config/hypr/workspace-deep.sh +1 move

# Floating windows
# Super+F toggles the active window between tiled and floating.
bind = $mod, F, togglefloating
# bindm = mouse drag while a modifier is held. mouse:272 = left button,
# mouse:273 = right button. Hold Super and drag anywhere on the window:
# left-drag moves it, right-drag resizes it.
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
