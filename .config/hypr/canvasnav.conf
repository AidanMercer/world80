# canvasnav — settings + keybinds.
#
# MANAGED BY THE SETTINGS POPUP (Super+Shift+H → `qs ipc call canvasNavSettings toggle`).
# The popup rewrites this whole file and runs `hyprctl reload`. You can also edit it by
# hand and run `hyprctl reload` yourself — just keep the structure (one `plugin {}` block
# and one `bind = …, canvasnav, <action>` line per action) so the popup can parse it back.
#
# Sourced from hyprland.conf:  source = ~/.config/hypr/canvasnav.conf
# The plugin itself is loaded by the exec-once in hyprland.conf.

plugin {
    canvasnav {
        # master on/off (Super+H toggles this live; off → arrows do plain movefocus)
        enabled = 1
        # how multiple monitors share the canvas:
        #   unified    — one plane across every monitor; navigate/scatter span all screens
        #   permonitor — each monitor is its own independent canvas
        #   edgejump   — per-monitor, but Super+Arrow at the edge hops to the next monitor
        multimonitor = unified
        # clear space (px) kept between scattered windows
        gap = 40
        # scatter tab size: a Super+Shift+N preset (1=22% … 5=86% of the monitor)
        tab_preset = 4
    }
}

# ── shortcuts ───────────────────────────────────────────────────────────────
# Open this settings popup.
bind = SUPER SHIFT, H, exec, qs ipc call canvasNavSettings toggle

# master on/off (off → arrows fall back to plain movefocus)
bind = SUPER, H, canvasnav, toggle
# spread ⇄ tiled (enter / leave canvas mode)
bind = SUPER, S, canvasnav, spread
# slide the nearest window in that direction to centre + focus it
bind = SUPER, left,  canvasnav, left
bind = SUPER, right, canvasnav, right
bind = SUPER, up,    canvasnav, up
bind = SUPER, down,  canvasnav, down
# recentre the whole scatter if it has drifted off
bind = SUPER, home, canvasnav, home
# overview — re-scatter every window AND shrink to fit so they're all visible
bind = SUPER, Tab, canvasnav, overview
# toggle the minimap (canvas overview in the bottom-right)
bind = SUPER SHIFT, M, canvasnav, minimap
# zoom out to fit the whole canvas / zoom back in to exactly where you were
bind = SUPER CTRL, up,   canvasnav, peekzoom
bind = SUPER CTRL, down, canvasnav, unpeekzoom
# resize the focused window to one of 5 presets (22% → 86% of the screen)
bind = SUPER SHIFT, 1, canvasnav, size 1
bind = SUPER SHIFT, 2, canvasnav, size 2
bind = SUPER SHIFT, 3, canvasnav, size 3
bind = SUPER SHIFT, 4, canvasnav, size 4
bind = SUPER SHIFT, 5, canvasnav, size 5

# Plain focus-move fallback (to revert canvasnav entirely: comment the binds above,
# uncomment these, and remove the plugin load line in hyprland.conf):
# bind = SUPER, left,  movefocus, l
# bind = SUPER, right, movefocus, r
# bind = SUPER, up,    movefocus, u
# bind = SUPER, down,  movefocus, d
